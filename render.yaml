services:
  - type: web
    name: student-teacher-erp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString

databases:
  - name: erp-db
    databaseName: erp_db
    user: erp_user
