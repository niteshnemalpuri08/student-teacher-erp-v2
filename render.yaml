services:
  - type: web
    name: student-teacher-erp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.server:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
  - type: pserv
    name: erp-db
    env: postgres
