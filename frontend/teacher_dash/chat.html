<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher - Parent Communication</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; padding: 15px; margin: 0; box-sizing: border-box; }
        .container { max-width: 1000px; margin: 0 auto; height: 92vh; display: flex; flex-direction: column; }
        .header { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .back-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 0.85em; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .chat-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 15px; flex: 1; min-height: 0; }
        .student-list { background: rgba(0,0,0,0.2); border-radius: 15px; overflow-y: auto; padding: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .student-item { padding: 12px; background: rgba(255,255,255,0.1); margin-bottom: 8px; border-radius: 10px; cursor: pointer; border-left: 4px solid transparent; transition: 0.2s; }
        .student-item:hover { background: rgba(255,255,255,0.15); }
        .student-item.active { background: rgba(255,255,255,0.25); border-left-color: #ffd700; }
        .chat-area { display: flex; flex-direction: column; background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .chat-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 10px; padding-right: 5px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.9em; word-wrap: break-word; line-height: 1.4; }
        .msg.sent { background: #667eea; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .msg.received { background: rgba(255,255,255,0.2); align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; gap: 8px; margin-top: 10px; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: none; outline: none; background: white; color: #333; font-family: 'Poppins', sans-serif; }
        button { padding: 0 25px; border-radius: 25px; border: none; background: #4CAF50; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        @media (max-width: 600px) { .chat-layout { grid-template-columns: 1fr; } .student-list { height: 200px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>💬 Parent Communication</h3>
            <a href="index.html" class="back-btn">Back</a>
        </div>
        <div class="chat-layout">
            <div class="student-list" id="studentList">Loading contact list...</div>
            <div class="chat-area">
                <div id="chatHeader" style="margin-bottom:10px; font-weight:600; font-size:0.9em; color:#ffd700;">Select a student's parent</div>
                <div class="chat-box" id="chatBox"></div>
                <div class="input-area">
                    <input type="text" id="msgInput" placeholder="Type a message..." disabled onkeypress="if(event.key==='Enter') sendMessage()">
                    <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        let currentParent = null;
        let refreshInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            if(!user || user.role !== 'teacher') window.location.href = '../login.html';
            loadStudents();
        });

        async function loadStudents() {
            try {
                const res = await fetch('/api/teacher/students', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user.username })
                });
                const data = await res.json();
                const list = document.getElementById('studentList');
                list.innerHTML = '';
                data.students.forEach(s => {
                    const parentUid = 'p_' + s.roll.toLowerCase(); 
                    const div = document.createElement('div');
                    div.className = 'student-item';
                    div.innerHTML = `<strong>${s.name}</strong><br><small>Roll: ${s.roll.toUpperCase()}</small>`;
                    div.onclick = () => selectParent(parentUid, s.name, div);
                    list.appendChild(div);
                });
            } catch(e) { console.error("Contact load error:", e); }
        }

        function selectParent(parentUid, studentName, el) {
            currentParent = parentUid;
            document.querySelectorAll('.student-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('chatHeader').innerText = "Parent of " + studentName;
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatBox').innerHTML = '<p style="text-align:center; opacity:0.5;">Loading chat...</p>';
            
            if(refreshInterval) clearInterval(refreshInterval);
            loadMsgs();
            refreshInterval = setInterval(loadMsgs, 3000);
        }

        async function loadMsgs() {
            if(!currentParent) return;
            try {
                const res = await fetch('/api/chat/history', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user1: user.username, user2: currentParent })
                });
                const msgs = await res.json();
                const box = document.getElementById('chatBox');
                const html = msgs.map(m => `<div class="msg ${m.sender === user.username ? 'sent' : 'received'}">${m.content}</div>`).join('');
                if(box.innerHTML !== html) {
                    box.innerHTML = html;
                    box.scrollTop = box.scrollHeight;
                }
            } catch(e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const content = input.value.trim();
            if(!content || !currentParent) return;
            try {
                const res = await fetch('/api/chat/send', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ sender: user.username, receiver: currentParent, content: content })
                });
                if(res.ok) {
                    input.value = '';
                    loadMsgs();
                }
            } catch(e) { alert("Failed to send"); }
        }
    </script>
</body>
</html>
