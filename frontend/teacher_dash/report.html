<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Marks Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-size: 0.9em; }
        .table-wrapper { overflow-x: auto; background: rgba(0,0,0,0.25); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 14px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9em; }
        th { color: #ffd700; background: rgba(255,255,255,0.05); }
        .avg-highlight { font-weight: bold; color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📊 Section Performance Report</h2>
            <a href="index.html" class="back-btn">Back</a>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="text-align:left">Roll</th>
                        <th style="text-align:left">Name</th>
                        <th>Math</th><th>Phy</th><th>Chem</th><th>CS</th><th>Eng</th><th>PE</th>
                        <th>Avg%</th><th>Att.%</th>
                    </tr>
                </thead>
                <tbody id="reportBody">
                    <tr><td colspan="10">Fetching section data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user || user.role !== 'teacher') window.location.href = '../login.html';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/teacher/students', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user.username })
                });
                const data = await res.json();
                const tbody = document.getElementById('reportBody');
                tbody.innerHTML = data.students.map(s => `
                    <tr>
                        <td style="text-align:left">${s.roll.toUpperCase()}</td>
                        <td style="text-align:left">${s.name}</td>
                        <td>${s.math_marks}</td><td>${s.physics_marks}</td><td>${s.chemistry_marks}</td>
                        <td>${s.cs_marks}</td><td>${s.english_marks}</td><td>${s.pe_marks}</td>
                        <td class="avg-highlight">${s.avg_marks}%</td>
                        <td>${s.attendance}%</td>
                    </tr>
                `).join('');
            } catch(e) { document.getElementById('reportBody').innerHTML = '<tr><td colspan="10">Connection Error</td></tr>'; }
        });
    </script>
</body>
</html>
