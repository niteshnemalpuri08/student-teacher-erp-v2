<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavior Profile - Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CORE GLASS-MORPHISM THEME */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            color: white; 
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 850px; }

        /* HEADER ENHANCEMENT */
        .header { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .back-btn { 
            background: rgba(255,255,255,0.15); 
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 10px 20px; 
            color: white; 
            border-radius: 12px; 
            cursor: pointer; 
            text-decoration: none; 
            transition: 0.3s;
            font-weight: 500;
        }

        .back-btn:hover { background: rgba(255,255,255,0.25); }

        /* SCORE ANALYTICS SECTION */
        .score-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .score-circle { 
            width: 180px; height: 180px; border-radius: 50%; 
            background: rgba(255,255,255,0.05); 
            border: 10px solid #4CAF50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 0 auto 20px auto; 
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.2);
            transition: 0.5s ease;
        }

        .score-val { font-size: 3.5em; font-weight: 700; line-height: 1; }
        .score-label { font-size: 0.85em; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }

        .ai-status-tag {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.1);
            color: #d1d8ff;
        }

        /* ACTIVITY LOG ENHANCEMENT */
        .log-card { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px);
            border-radius: 20px; 
            padding: 30px; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        h3 { margin-bottom: 20px; font-weight: 600; opacity: 0.9; }

        .log-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(255,255,255,0.05);
            margin-bottom: 12px;
            padding: 15px 20px; 
            border-radius: 12px;
            transition: 0.3s;
        }

        .log-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        
        .badge { 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 0.85em; 
            font-weight: 600; 
        }

        .pos { background: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.3); }
        .neg { background: rgba(244, 67, 54, 0.2); color: #FF7043; border: 1px solid rgba(244, 67, 54, 0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="letter-spacing: -1px;">⭐ Behavioral Analytics</h1>
                <p style="opacity: 0.8; font-size: 0.9rem;">Discipline & Conduct tracking via AI insights</p>
            </div>
            <a href="index.html" class="back-btn">← Back to Portal</a>
        </div>

        <div class="score-section">
            <div class="score-circle" id="scoreCircle">
                <span class="score-val" id="behavScore">--</span>
                <span class="score-label">Points</span>
            </div>
            <div class="ai-status-tag" id="aiStatus">
                🤖 AI Evaluation: Loading...
            </div>
        </div>

        <div class="log-card">
            <h3>📝 Conduct Log</h3>
            <div id="logList">
                </div>
        </div>
    </div>

    <script src="../data_store.js"></script>
    <script src="student_sync.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = (typeof STUDENT_SYNC !== 'undefined') ? STUDENT_SYNC.getData() : { stats: { attendance: 85 } };
            
            // Logic remained identical as requested
            let score = 80; 
            if(data.stats.attendance > 90) score += 15;
            else if(data.stats.attendance > 80) score += 10;
            else if(data.stats.attendance < 75) score -= 10;
            
            score = Math.min(100, Math.max(0, score));

            const circle = document.getElementById('scoreCircle');
            const val = document.getElementById('behavScore');
            const statusTag = document.getElementById('aiStatus');
            
            val.textContent = score;
            
            // Dynamic UI updates based on score
            if(score >= 90) {
                circle.style.borderColor = "#4CAF50";
                circle.style.boxShadow = "0 0 40px rgba(76, 175, 80, 0.3)";
                statusTag.innerHTML = "🤖 AI Status: Exemplary Conduct";
            } else if(score >= 75) {
                circle.style.borderColor = "#FF9800";
                circle.style.boxShadow = "0 0 40px rgba(255, 152, 0, 0.2)";
                statusTag.innerHTML = "🤖 AI Status: Stable / Good Standings";
            } else {
                circle.style.borderColor = "#F44336";
                circle.style.boxShadow = "0 0 40px rgba(244, 67, 54, 0.3)";
                statusTag.innerHTML = "🤖 AI Status: Attention Required / At-Risk";
            }

            const logs = document.getElementById('logList');
            let html = '';

            if(score >= 90) {
                html += row("Perfect Attendance Month", "+10 pts", "pos");
                html += row("Active Class Participation", "+5 pts", "pos");
            } else if (score >= 75) {
                html += row("Consistent Assignment Submissions", "+5 pts", "pos");
                html += row("Minor Punctuality Issue (Physics)", "-2 pts", "neg");
            } else {
                html += row("Unexcused Absence (CS)", "-5 pts", "neg");
                html += row("Classroom Disturbance Report", "-10 pts", "neg");
            }

            logs.innerHTML = html;
        });

        function row(title, points, type) {
            return `
            <div class="log-item">
                <span style="font-weight: 500;">${title}</span>
                <span class="badge ${type}">${points}</span>
            </div>`;
        }
    </script>
</body>
</html>
