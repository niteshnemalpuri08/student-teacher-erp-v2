<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; padding: 20px; margin: 0; box-sizing: border-box; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .back-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; cursor: pointer; font-size: 0.9em; }
        
        .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        
        .att-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid transparent; }
        .att-val { font-size: 1.8em; font-weight: 700; display: block; margin: 5px 0 0 0; }
        .count-badge { font-size: 0.85em; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 15px; display: inline-block; margin-top: 5px; color: #FFD700; font-weight: 600; }
        
        .chart-box { height: 300px; position: relative; }
        
        @media (max-width: 600px) { .header { flex-direction: column; gap: 10px; text-align: center; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>📅 My Attendance</h2>
                <p style="font-size:0.9em; opacity:0.8">Calculated from 50 total classes</p>
            </div>
            <a href="index.html" class="back-btn">Back</a>
        </div>

        <div class="card">
            <h3>Subject Wise Breakdown</h3>
            <div class="grid" id="attGrid">Loading...</div>
        </div>

        <div class="card">
            <h3>Visual Distribution</h3>
            <div class="chart-box"><canvas id="attChart"></canvas></div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) window.location.href = '../login.html';

        document.addEventListener('DOMContentLoaded', async () => {
            const TOTAL_CLASSES = 50; // Standard base for calculation

            try {
                const res = await fetch(`/api/students/${user.username}`);
                const data = await res.json();
                const overall = data.attendance || 0; 
                
                // Helper to calculate count from %
                const getCount = (pct) => Math.round((pct / 100) * TOTAL_CLASSES);

                const subjects = [
                    { name: 'Math', val: overall }, 
                    { name: 'Physics', val: overall },
                    { name: 'Chemistry', val: overall },
                    { name: 'Computer Sci', val: overall },
                    { name: 'English', val: overall }
                ];

                document.getElementById('attGrid').innerHTML = subjects.map(s => {
                    const attended = getCount(s.val);
                    const borderColor = s.val < 75 ? '#ff6b6b' : '#4caf50';
                    return `
                    <div class="att-card" style="border-color: ${borderColor}">
                        <h4 style="margin:0; opacity:0.8; font-size:0.9em;">${s.name}</h4>
                        <span class="att-val" style="color:${borderColor}">${s.val}%</span>
                        <div class="count-badge">${attended} / ${TOTAL_CLASSES}</div>
                    </div>`;
                }).join('');

                new Chart(document.getElementById('attChart'), {
                    type: 'bar',
                    data: {
                        labels: subjects.map(s => s.name),
                        datasets: [{ 
                            label: 'Attendance %', 
                            data: subjects.map(s => s.val), 
                            backgroundColor: subjects.map(s => s.val < 75 ? 'rgba(255, 99, 132, 0.8)' : 'rgba(75, 192, 192, 0.8)'),
                            borderRadius: 5 
                        }]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false, 
                        scales: { 
                            y: { beginAtZero: true, max: 100, ticks: { color: 'white' }, grid: { color: 'rgba(255,255,255,0.1)' } }, 
                            x: { ticks: { color: 'white' }, grid: { display: false } } 
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            } catch(e) { console.error(e); }
        });
    </script>
</body>
</html>
