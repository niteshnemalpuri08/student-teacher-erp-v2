<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Performance Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; padding: 20px; margin: 0; box-sizing: border-box; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .back-btn { background: rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 20px; text-decoration: none; }
        .pred-card { background: linear-gradient(145deg, rgba(233, 30, 99, 0.4), rgba(0,0,0,0.2)); border-left: 6px solid #E91E63; padding: 40px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        .pred-val { font-size: 5em; font-weight: 700; margin: 10px 0; }
        .card { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .tip { margin-top: 10px; font-size: 1em; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h2>🔮 AI Predictor</h2>
                <p>Analyzing: <strong id="studentLabel" style="color:#FFD700">...</strong></p>
            </div>
            <a href="index.html" class="back-btn">Back</a>
        </div>

        <div class="pred-card">
            <div class="pred-label">Predicted Final Semester Score</div>
            <div class="pred-val" id="finalScore">--%</div>
            <p id="trendMsg">Calculating probabilities...</p>
        </div>

        <div class="card">
            <h3>📊 Analysis Data</h3>
            <div style="margin-top:20px; display: flex; justify-content: space-around;">
                <div><small>Current Avg</small><h2 id="currAvg">--</h2></div>
                <div><small>Attendance</small><h2 id="currAtt">--%</h2></div>
            </div>
            <div id="aiAdvice" class="tip" style="margin-top:20px">Please wait...</div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) window.location.href = '../login.html';

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('studentLabel').textContent = user.name;
            try {
                const res = await fetch(`/api/predict/${user.username}`);
                const data = await res.json();
                
                const pred = data.predicted_final_score;
                const curr = data.current_avg;

                document.getElementById('finalScore').textContent = pred + "%";
                document.getElementById('currAvg').textContent = curr;
                document.getElementById('currAtt').textContent = data.current_attendance + "%";

                const msg = document.getElementById('trendMsg');
                const advice = document.getElementById('aiAdvice');

                if(pred >= curr) {
                    msg.innerHTML = "🚀 You are on an <strong>UPWARD</strong> trend!";
                    advice.innerHTML = "✨ AI Analysis: Your consistent marks and good attendance are projected to increase your final result.";
                } else {
                    msg.innerHTML = "⚠️ Risk of <strong>Grade Drop</strong> detected.";
                    advice.innerHTML = "💡 AI Tip: Lower attendance or inconsistent mid-term marks are dragging your prediction down. Focus on upcoming tests!";
                }
            } catch(e) { console.error(e); }
        });
    </script>
</body>
</html>
