<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 30px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 15px; }
        .user-info h1 { font-size: 1.8em; margin: 0; }
        .user-info p { margin: 5px 0 0; opacity: 0.8; font-size: 0.9em; letter-spacing: 1px; }
        .header-actions { display: flex; gap: 10px; }
        .btn { border: none; padding: 10px 25px; border-radius: 25px; cursor: pointer; transition: 0.3s; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
        .logout-btn { background: rgba(255,255,255,0.2); color: white; }
        .logout-btn:hover { background: rgba(255,255,255,0.3); }
        .download-btn { background: linear-gradient(135deg, #FFD700, #FFA500); color: #333; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 25px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s; }
        .stat-value { font-size: 2.5em; font-weight: 700; display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.9em; opacity: 0.8; text-transform: uppercase; }
        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .nav-card { background: rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 15px; text-decoration: none; color: white; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 5px solid transparent; }
        .nav-card:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .nav-icon { font-size: 2.5em; display: block; margin-bottom: 10px; }
        .nav-desc { font-size: 0.85em; opacity: 0.7; margin-top: 5px; }
        .card-att { border-left-color: #4CAF50; }
        .card-perf { border-left-color: #2196F3; }
        .card-assign { border-left-color: #FF9800; }
        @media (max-width: 600px) { .header { flex-direction: column; text-align: center; } .btn { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <h1 id="welcomeName">Welcome, Student</h1>
                <p id="rollDisplay">Loading data...</p>
            </div>
            <div class="header-actions">
                <button class="btn download-btn" onclick="downloadReport(this)">📄 Get Report</button>
                <button class="btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-value" id="attValue">--%</span><span class="stat-label">Attendance</span></div>
            <div class="stat-card"><span class="stat-value" id="scoreValue">--%</span><span class="stat-label">Avg Marks</span></div>
            <div class="stat-card"><span class="stat-value" id="rankValue">#--</span><span class="stat-label">Class Rank</span></div>
            <div class="stat-card"><span class="stat-value" id="assignValue">--</span><span class="stat-label">Pending Tasks</span></div>
        </div>
        <div class="nav-grid">
            <a href="attendance.html" class="nav-card card-att"><span class="nav-icon">📅</span><strong>Attendance</strong><span class="nav-desc">Logs</span></a>
            <a href="performance.html" class="nav-card card-perf"><span class="nav-icon">📊</span><strong>Performance</strong><span class="nav-desc">Analysis</span></a>
            <a href="fees.html" class="nav-card" style="border-left-color: #2ecc71;"><span class="nav-icon">💳</span><strong>Pay Fees</strong><span class="nav-desc">Secure</span></a>
            <a href="assignments.html" class="nav-card card-assign"><span class="nav-icon">📝</span><strong>Assignments</strong><span class="nav-desc">Submit</span></a>
            <a href="predict.html" class="nav-card" style="border-left-color: #9C27B0;"><span class="nav-icon">📈</span><strong>Predictor</strong><span class="nav-desc">AI Risk</span></a>
            <a href="behavior.html" class="nav-card" style="border-left-color: #E91E63;"><span class="nav-icon">⭐</span><strong>Behavior</strong><span class="nav-desc">Conduct</span></a>
            <a href="resources.html" class="nav-card" style="border-left-color: #00BCD4;"><span class="nav-icon">📚</span><strong>Resources</strong><span class="nav-desc">Notes</span></a>
            <a href="predictor.html" class="nav-card" style="border-left: 5px solid #9C27B0;"><span class="nav-icon">🔮</span><strong>Calculator</strong><span class="nav-desc">Bunk</span></a>
            <a href="analytics.html" class="nav-card" style="border-left-color: #FFD700;"><span class="nav-icon">🏆</span><strong>Ranking</strong><span class="nav-desc">Class Analytics</span></a>
        </div>
    </div>

    <script>
        // --- AUTH GUARD ---
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'student') { window.location.href = '../login.html'; }

        document.addEventListener('DOMContentLoaded', async () => {
            if(!user) return;
            document.getElementById('welcomeName').textContent = `Welcome, ${user.name}`;
            document.getElementById('rollDisplay').textContent = `ID: ${user.username.toUpperCase()} | Section: ${user.section}`;

            try {
                const res = await fetch(`/api/students/${user.username}`);
                const data = await res.json();
                document.getElementById('attValue').textContent = data.attendance + '%';
                document.getElementById('scoreValue').textContent = data.avg_marks + '%';
                document.getElementById('rankValue').textContent = '#' + (data.rank || '--');
                document.getElementById('assignValue').textContent = data.avg_marks < 60 ? 3 : 0;
            } catch(e) { console.error(e); }
        });

        async function downloadReport(btn) {
            btn.textContent = "⏳...";
            try {
                const res = await fetch('/api/report/download', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user.username }) 
                });
                if(res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url;
                    a.download = `Report_${user.username}.pdf`; a.click();
                    btn.textContent = "✅ Done";
                }
            } catch(e) { btn.textContent = "❌ Error"; }
            setTimeout(() => btn.textContent = "📄 Get Report", 2000);
        }

        function logout() { localStorage.clear(); window.location.href = '../login.html'; }
    </script>
</body>
</html>
