<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Assignments</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; padding: 15px; margin: 0; box-sizing: border-box; }
        .header { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255, 255, 255, 0.1); }
        .back-btn { background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 8px 15px; border-radius: 25px; cursor: pointer; text-decoration: none; font-size: 0.9em; }
        .assignment-card { background: rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px; border-left: 4px solid; margin-bottom: 15px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 0.8em; background: rgba(255,255,255,0.1); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; font-size:1.2em">📝 Tasks</h1>
        <a href="index.html" class="back-btn">Back</a>
    </div>
    <p>Student: <strong id="studentNameDisplay">Loading...</strong></p>
    <div id="assignmentsGrid"></div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'parent') window.location.href = '../login.html';

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const res = await fetch('/api/parent/child', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user.username })
                });
                const data = await res.json();
                if(data.error) return;

                document.getElementById('studentNameDisplay').textContent = data.child_name;

                // 2. USE REAL SCORES FOR ASSIGNMENTS
                const list = [
                    { title: 'Calculus Quiz 1', subject: 'Math', status: 'graded', score: data.math },
                    { title: 'Physics Lab Record', subject: 'Physics', status: 'graded', score: data.phy },
                    { title: 'Java Code Submission', subject: 'CS', status: 'graded', score: data.cs },
                    { title: 'English Essay', subject: 'English', status: 'pending', score: null }
                ];

                document.getElementById('assignmentsGrid').innerHTML = list.map(a => `
                    <div class="assignment-card" style="border-left-color: ${a.status==='graded'?'#4caf50':'#ff9800'}">
                        <div style="font-weight:600; font-size:1.1em;">${a.title}</div>
                        <div style="opacity:0.7; font-size:0.9em;">${a.subject}</div>
                        ${a.score ? `<div style="font-weight:700; color:#4caf50;">Score: ${a.score}/100</div>` : ''}
                        <span class="status-badge">${a.status.toUpperCase()}</span>
                    </div>
                `).join('');

            } catch(e) {}
        });
    </script>
</body>
</html>
