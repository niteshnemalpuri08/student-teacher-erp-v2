<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 20px; color: white; border-radius: 20px; cursor: pointer; text-decoration: none; }
        .big-stat { text-align: center; margin: 40px 0; }
        .percentage { font-size: 5em; font-weight: bold; }
        .status-box { padding: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📅 Attendance Record</h2>
            <a href="index.html" class="back-btn">Back</a>
        </div>

        <div class="big-stat">
            <div class="percentage" id="attPct">--%</div>
            <p>Overall Attendance</p>
        </div>

        <div class="status-box" id="statusBox">Loading...</div>
    </div>

    <script>
        // 1. AUTH GUARD
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'parent') window.location.href = '../login.html';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                // 2. Fetch specific child data
                const res = await fetch('/api/parent/child', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user.username })
                });
                const data = await res.json();
                if (data.error) return;

                const pct = data.attendance || 0;
                document.getElementById('attPct').textContent = pct + '%';

                const box = document.getElementById('statusBox');
                if (pct >= 75) {
                    box.innerHTML = "✅ <strong>Good Standing:</strong> Your child is attending classes regularly.";
                    box.style.borderLeft = "5px solid #4caf50";
                } else {
                    box.innerHTML = "⚠️ <strong>Warning:</strong> Attendance is low. Please contact the teacher.";
                    box.style.borderLeft = "5px solid #f44336";
                }
            } catch (e) { console.error(e); }
        });
    </script>
</body>
</html>
